    "pypiwin32==223",
    "pywin32==311",
    "pyyaml==6.0.3",
    "rich==14.3.3",
    "setuptools==82.0.1",
    "shellingham==1.5.4",
    "six==1.17.0",
    "sympy==1.14.0",
    "tensorboard==2.20.0",
    "tensorboard-data-server==0.7.2",
    "torch==2.8.0",
    "tqdm==4.67.3",
    "typer==0.24.1",
    "typing-extensions==4.15.0",
    "werkzeug==3.1.6",
    "mlagents-envs",
    "mlagents"
