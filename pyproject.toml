    "anyio==4.12.1",
    "attrs==26.1.0",
    "cattrs==1.5.0",
    "certifi==2026.2.25",
    "click==8.3.1",
    "cloudpickle==3.1.2",
    "colorama==0.4.6",
    "exceptiongroup==1.3.1",
    "filelock==3.25.2",
    "fsspec==2026.2.0",
    "grpcio==1.53.2",
    "gym==0.26.2",
    "gym-notices==0.1.0",
    "h11==0.16.0",
    "h5py==3.16.0",
    "hf-xet==1.4.2",
    "httpcore==1.0.9",
    "httpx==0.28.1",
    "huggingface-hub==1.7.2",
    "idna==3.11",
    "jinja2==3.1.6",
    "markdown==3.10.2",
    "markdown-it-py==4.0.0",
    "markupsafe==3.0.3",
